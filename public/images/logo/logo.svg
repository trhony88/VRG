  <path d="&#10;    M 0 -10&#10;    C 0 -10, 55 30, 65 90&#10;    C 75 140, 60 170, 45 195&#10;    C 65 165, 72 135, 62 105&#10;    C 55 140, 45 175, 30 205&#10;    C 38 170, 42 140, 34 115&#10;    C 20 150, 12 185, 10 215&#10;    C 4 180, 8 145, 2 120&#10;    C -8 155, -14 190, -12 220&#10;    C -20 185, -18 150, -24 125&#10;    C -38 160, -40 195, -35 220&#10;    C -48 190, -52 155, -44 120&#10;    C -60 145, -68 175, -62 205&#10;    C -72 175, -70 140, -58 105&#10;    C -72 130, -75 165, -66 195&#10;    C -80 165, -78 125, -60 90&#10;    C -45 55, -20 20, 0 -10 Z&#10;  " fill="url(#fG)" opacity="0.97" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.97;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Flame inner highlight -->
  <path d="&#10;    M 0 20&#10;    C 10 45, 28 70, 30 105&#10;    C 32 130, 22 155, 14 178&#10;    C 20 152, 22 128, 16 108&#10;    C 10 130, 6 158, 4 182&#10;    C -2 155, 0 128, -4 108&#10;    C -12 135, -16 162, -14 185&#10;    C -22 158, -20 130, -14 108&#10;    C -24 128, -26 152, -22 172&#10;    C -30 148, -28 120, -16 98&#10;    C -8 70, -4 45, 0 20 Z&#10;  " fill="url(#fG2)" opacity="0.55" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- WHEAT STEM -->
  <path d="M 0 210 Q 6 150 8 80" fill="none" stroke="#CC6600" stroke-width="3.5" stroke-linecap="round" style="fill:none;stroke:rgb(204, 102, 0);color:rgb(255, 255, 255);stroke-width:3.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wheat tip -->
  <ellipse cx="9" cy="68" rx="6" ry="11" fill="url(#wG)" transform="rotate(8,9,68)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

