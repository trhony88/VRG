<svg width="100%" viewBox="0 0 690 730" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">VRG Gaming Team Ventes</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo VRG Gaming Team Ventes, design professionnel doré sur fond noir</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#111111"/>
    <stop offset="100%" stop-color="#000000"/>
  </linearGradient>
  <linearGradient id="fG" x1="0.2" y1="0" x2="0.8" y2="1">
    <stop offset="0%" stop-color="#FFDD55"/>
    <stop offset="35%" stop-color="#FF9900"/>
    <stop offset="100%" stop-color="#CC5500"/>
  </linearGradient>
  <linearGradient id="fG2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFB300"/>
    <stop offset="100%" stop-color="#993300"/>
  </linearGradient>
  <linearGradient id="wG" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFAA33"/>
    <stop offset="100%" stop-color="#AA4400"/>
  </linearGradient>
  <linearGradient id="lG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFE066"/>
    <stop offset="45%" stop-color="#FFAA00"/>
    <stop offset="100%" stop-color="#BB6600"/>
  </linearGradient>
  <linearGradient id="divG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#000000"/>
    <stop offset="30%" stop-color="#FFAA00"/>
    <stop offset="70%" stop-color="#FFAA00"/>
    <stop offset="100%" stop-color="#000000"/>
  </linearGradient>
  <filter id="softGlow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>

<rect width="680" height="720" fill="url(#bg)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Subtle outer ring decoration -->
<circle cx="340" cy="280" r="195" fill="none" stroke="#FF9900" stroke-width="0.6" opacity="0.18" style="fill:none;stroke:rgb(255, 153, 0);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.18;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="340" cy="280" r="185" fill="none" stroke="#FFAA00" stroke-width="0.4" opacity="0.12" style="fill:none;stroke:rgb(255, 170, 0);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.12;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- === EMBLEM GROUP centered at 340, top at 80 === -->
<g transform="translate(340,95)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

